name: Test Plugins

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:

env:
  LLNG_REPO: https://gitlab.ow2.org/lemonldap-ng/lemonldap-ng.git

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_tests: ${{ steps.find.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v5

      - id: find
        name: Build matrix from plugin.json:llng_compat
        run: |
          set -euo pipefail
          REPO="$LLNG_REPO"
          # Cache of already-checked tags across plugins
          declare -A TAG_KNOWN
          tag_exists() {
            local tag="$1"
            if [ -z "${TAG_KNOWN[$tag]+x}" ]; then
              if git ls-remote --tags "$REPO" "$tag" 2>/dev/null \
                   | grep -Eq "refs/tags/${tag}(\^\{\})?$"; then
                TAG_KNOWN[$tag]=1
              else
                TAG_KNOWN[$tag]=0
              fi
            fi
            [ "${TAG_KNOWN[$tag]}" = "1" ]
          }

          entries=()
          for d in plugins/*/; do
            [ -d "$d/t" ] || continue
            name=$(basename "$d")
            compat=$(jq -r '.llng_compat // ""' "$d/plugin.json")

            min=$(echo "$compat" | grep -oE '>=\s*[0-9.]+' \
                    | grep -oE '[0-9.]+' | head -1 || true)
            max=$(echo "$compat" | grep -oE '<\s*[0-9.]+' \
                    | grep -oE '[0-9.]+' | head -1 || true)

            refs=()
            skip_main=false

            if [ -n "${min:-}" ]; then
              tag="v$min"
              if tag_exists "$tag"; then
                refs+=("$tag")
                echo "  $name: min tag $tag found"
              else
                echo "  $name: min tag $tag not in remote"
              fi
            fi

            if [ -n "${max:-}" ]; then
              tag="v$max"
              if tag_exists "$tag"; then
                refs+=("$tag")
                skip_main=true
                echo "  $name: max tag $tag found -> skipping main"
              else
                echo "  $name: max tag $tag not in remote"
              fi
            fi

            if [ "$skip_main" = "false" ]; then
              refs+=("")  # empty string means "default branch"
            fi

            for r in "${refs[@]}"; do
              label="${r:-main}"
              entries+=("{\"plugin\":\"$name\",\"ref\":\"$r\",\"label\":\"$label\"}")
            done
          done

          if [ ${#entries[@]} -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          include="[$(IFS=,; echo "${entries[*]}")]"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          echo "Matrix:"
          echo "$include" | jq .

  test:
    needs: discover
    if: needs.discover.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    name: ${{ matrix.plugin }} @ ${{ matrix.label }}
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP/CLI dependencies
        run: cd mcp && npm install --no-audit --no-fund

      - name: Prepare plugin (clone LLNG + make common + symlinks)
        run: |
          REF="${{ matrix.ref }}"
          if [ -n "$REF" ]; then
            ./mcp/cli.js prepare "${{ matrix.plugin }}" --ref "$REF"
          else
            ./mcp/cli.js prepare "${{ matrix.plugin }}"
          fi

      - name: Install LLNG build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends devscripts equivs
          cd .llng-test/lemonldap-ng
          sudo mk-build-deps -i -t 'apt-get -y --no-install-recommends' debian/control

      - name: Install plugin extra build dependencies
        run: |
          PLUGIN_DIR="plugins/${{ matrix.plugin }}"
          BUILD_DEPS=$(jq -r '.build_depends // [] | .[]' "$PLUGIN_DIR/plugin.json")
          if [ -n "$BUILD_DEPS" ]; then
            echo "Installing extra build deps: $BUILD_DEPS"
            sudo apt-get install -y --no-install-recommends $BUILD_DEPS
          fi

      - name: Run tests
        run: ./mcp/cli.js execute "${{ matrix.plugin }}"

  # Global lint: aggregate every plugin's manager-overrides/*.json under a
  # single directory and run llng-build-manager-files against the union.
  # Catches cross-plugin issues that per-plugin jobs miss because they only
  # see their own override file. In particular it triggers the validation
  # pass that rejects hash-of-X containers declared as ctree leaves.
  validate-overrides:
    needs: discover
    if: needs.discover.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    name: validate manager-overrides
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP/CLI dependencies
        run: cd mcp && npm install --no-audit --no-fund

      - name: Clone LLNG (default branch, shallow)
        run: |
          # Use any plugin to share the prepare logic (clone + make common).
          ANY_PLUGIN=$(ls plugins | head -n1)
          ./mcp/cli.js prepare "$ANY_PLUGIN"

      - name: Install build-script Perl dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libregexp-assemble-perl libregexp-common-perl \
            libjson-perl libio-string-perl libmouse-perl perl

      - name: Aggregate all plugin manager-overrides
        run: |
          mkdir -p .llng-overrides-all
          for f in plugins/*/manager-overrides/*.json; do
            [ -f "$f" ] || continue
            cp "$f" .llng-overrides-all/
          done
          echo "Collected $(ls -1 .llng-overrides-all/*.json 2>/dev/null | wc -l) override file(s)"
          ls -1 .llng-overrides-all/

      - name: Run llng-build-manager-files in lint mode
        run: |
          export PERL5LIB="$PWD/.llng-test/lemonldap-ng/lemonldap-ng-manager/lib:$PWD/.llng-test/lemonldap-ng/lemonldap-ng-common/lib:$PWD/.llng-test/lemonldap-ng/lemonldap-ng-handler/lib:$PWD/.llng-test/lemonldap-ng/lemonldap-ng-portal/lib"
          ./store/scripts/llng-build-manager-files \
            --plugins-dir=.llng-overrides-all \
            --struct-file=/dev/null \
            --conftree-file=/dev/null \
            --reverse-tree-file=/dev/null \
            --manager-constants-file=/dev/null \
            --manager-attributes-file=/dev/null \
            --default-values-file=/dev/null \
            --conf-constants-file=/dev/null \
            --portal-constants-file=/dev/null \
            --handler-status-constants-file=/dev/null \
            --doc-constants-file=/dev/null \
            --first-lmconf-file=/dev/null \
            --lang-dir=/nonexistent

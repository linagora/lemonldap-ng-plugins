name: Publish Plugin Store

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" --pinentry-mode loopback --import
          # Trust the key
          GPG_FINGERPRINT=$(gpg --list-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          echo "${GPG_FINGERPRINT}:6:" | gpg --import-ownertrust

      - name: Build store
        run: |
          set -e
          STORE_DIR="_site"
          mkdir -p "$STORE_DIR"

          # Export public key from the imported private key
          GPG_FINGERPRINT=$(gpg --list-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          gpg --armor --export "$GPG_FINGERPRINT" > "$STORE_DIR/store-key.asc"
          echo "Exported GPG public key: $GPG_FINGERPRINT"

          TAG="${GITHUB_REF_NAME}"
          STORE_URL="${{ github.event.repository.html_url }}"
          # GitHub Pages URL: https://<owner>.github.io/<repo>/
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          echo "Building store for tag $TAG"

          # Build each plugin archive
          PLUGINS_JSON="[]"
          for plugin_dir in plugins/*/; do
            [ -f "$plugin_dir/plugin.json" ] || continue
            plugin_name=$(basename "$plugin_dir")

            # Read metadata from plugin.json
            name=$(jq -r '.name' "$plugin_dir/plugin.json")
            version=$(jq -r '.version' "$plugin_dir/plugin.json")
            summary=$(jq -r '.summary // ""' "$plugin_dir/plugin.json")
            description=$(jq -r '.description // ""' "$plugin_dir/plugin.json")
            author=$(jq -r '.author // ""' "$plugin_dir/plugin.json")
            license=$(jq -r '.license // ""' "$plugin_dir/plugin.json")
            llng_compat=$(jq -r '.llng_compat // ""' "$plugin_dir/plugin.json")
            perl_requires=$(jq -c '.perl_requires // {}' "$plugin_dir/plugin.json")
            custom_plugins=$(jq -r '.customPlugins // ""' "$plugin_dir/plugin.json")
            post_install=$(jq -r '.post_install // ""' "$plugin_dir/plugin.json")

            archive_name="llng-plugin-${name}-${version}.tar.gz"

            echo "  Packaging $name v$version -> $archive_name"

            # Create tar.gz with the expected top-level directory name
            tar czf "$STORE_DIR/$archive_name" \
              --transform "s|^plugins/$plugin_name|llng-plugin-${name}-${version}|" \
              "$plugin_dir"

            # Sign archive
            sig_name="${archive_name}.asc"
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" --pinentry-mode loopback --armor --detach-sign --output "$STORE_DIR/$sig_name" "$STORE_DIR/$archive_name"
            echo "  Signed: $sig_name"

            # Compute SHA256
            sha256=$(sha256sum "$STORE_DIR/$archive_name" | cut -d' ' -f1)

            # Read tags if present
            tags=$(jq -c '.tags // []' "$plugin_dir/plugin.json")

            # Read homepage if present
            homepage=$(jq -r '.homepage // ""' "$plugin_dir/plugin.json")

            # Build plugin entry for index.json
            plugin_entry=$(jq -n \
              --arg name "$name" \
              --arg version "$version" \
              --arg summary "$summary" \
              --arg description "$description" \
              --arg author "$author" \
              --arg license "$license" \
              --arg llng_compat "$llng_compat" \
              --argjson perl_requires "$perl_requires" \
              --arg archive "$archive_name" \
              --arg sha256 "$sha256" \
              --arg signature "$sig_name" \
              --argjson tags "$tags" \
              --arg homepage "$homepage" \
              --arg customPlugins "$custom_plugins" \
              --arg post_install "$post_install" \
              --arg published "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                name: $name,
                version: $version,
                summary: $summary,
                description: $description,
                author: $author,
                license: $license,
                llng_compat: $llng_compat,
                perl_requires: $perl_requires,
                archive: $archive,
                sha256: $sha256,
                signature: $signature,
                tags: $tags,
                homepage: $homepage,
                customPlugins: $customPlugins,
                post_install: $post_install,
                published: $published
              }')

            PLUGINS_JSON=$(echo "$PLUGINS_JSON" | jq --argjson entry "$plugin_entry" '. + [$entry]')
          done

          # Generate index.json
          jq -n \
            --arg name "Linagora LLNG Plugins" \
            --arg url "$PAGES_URL" \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg gpgKey "${PAGES_URL}store-key.asc" \
            --argjson plugins "$PLUGINS_JSON" \
            '{
              store: {
                name: $name,
                url: $url,
                updated: $updated,
                gpgKey: $gpgKey
              },
              plugins: $plugins
            }' > "$STORE_DIR/index.json"

          echo "Store index:"
          jq . "$STORE_DIR/index.json"

          # Copy logo
          cp linagora.png "$STORE_DIR/linagora.png"

          # Generate index.html landing page
          PLUGIN_COUNT=$(echo "$PLUGINS_JSON" | jq length)
          PLUGIN_ROWS=""
          for row in $(echo "$PLUGINS_JSON" | jq -r '.[] | @base64'); do
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }
            PLUGIN_ROWS="$PLUGIN_ROWS<tr><td><strong>$(_jq '.name')</strong></td><td>$(_jq '.version')</td><td>$(_jq '.summary')</td><td>$(_jq '.llng_compat')</td></tr>"
          done

          cat > "$STORE_DIR/index.html" <<HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Linagora's LemonLDAP::NG Plugin Store</title>
            <style>
              :root { --primary: #c8102e; --primary-light: #fdeaed; --gray: #f8f9fa; --border: #e0e0e0; }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; line-height: 1.6; }
              .header { background: linear-gradient(135deg, var(--primary) 0%, #8b0a1e 100%); color: #fff; padding: 2em 1em; text-align: center; }
              .header img { height: 36px; margin-bottom: 1em; }
              .header h1 { font-size: 1.8em; font-weight: 600; margin-bottom: .3em; }
              .header p { opacity: .9; font-size: 1.1em; }
              .container { max-width: 960px; margin: 0 auto; padding: 2em 1em; }
              h2 { color: var(--primary); font-size: 1.3em; margin: 2em 0 .8em; padding-bottom: .4em; border-bottom: 2px solid var(--primary-light); }
              h3 { color: #555; font-size: 1em; margin: 1.2em 0 .4em; }
              table { border-collapse: collapse; width: 100%; margin: 1em 0; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
              th { background: var(--primary); color: #fff; padding: 10px 14px; text-align: left; font-weight: 500; }
              td { padding: 10px 14px; border-top: 1px solid var(--border); }
              tr:nth-child(even) { background: var(--gray); }
              code { background: #eee; padding: 2px 6px; border-radius: 3px; font-size: .9em; }
              pre { background: #1e1e1e; color: #d4d4d4; padding: 1em 1.2em; border-radius: 6px; overflow-x: auto; font-size: .85em; line-height: 1.5; margin: .6em 0; }
              .note { background: var(--primary-light); border-left: 4px solid var(--primary); padding: 1em 1.2em; border-radius: 0 6px 6px 0; margin: 1em 0; }
              .note strong { color: var(--primary); }
              .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1em; margin: 1em 0; }
              .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 1.2em; }
              .card h3 { margin: 0 0 .5em; color: var(--primary); }
              .card pre { font-size: .8em; }
              .footer { text-align: center; padding: 2em 1em; color: #888; font-size: .85em; border-top: 1px solid var(--border); margin-top: 2em; }
              .footer a { color: var(--primary); text-decoration: none; }
              .footer a:hover { text-decoration: underline; }
              .footer-links { list-style: none; padding: 0; margin: 0 auto 1em; display: inline-block; text-align: left; }
              .footer-links li { padding: .2em 0; }
              .footer-links li::before { content: "\203a\00a0"; color: var(--primary); }
              .badge { display: inline-block; background: var(--primary); color: #fff; font-size: .75em; padding: 2px 8px; border-radius: 10px; vertical-align: middle; }
            </style>
          </head>
          <body>
            <div class="header">
              <img src="linagora.png" alt="Linagora">
              <h1>LemonLDAP::NG Plugin Store</h1>
              <p><span class="badge">${PLUGIN_COUNT} plugins</span> ready to install</p>
            </div>

            <div class="container">
              <h2>Available Plugins</h2>
              <table>
                <thead><tr><th>Name</th><th>Version</th><th>Description</th><th>Compat</th></tr></thead>
                <tbody>${PLUGIN_ROWS}</tbody>
              </table>

              <h2>Quick Start</h2>
              <div class="cards">
                <div class="card">
                  <h3>1. Register this store</h3>
                  <pre>sudo lemonldap-ng-store add-store \\
            ${PAGES_URL}</pre>
                </div>
                <div class="card">
                  <h3>2. Browse &amp; install</h3>
                  <pre>lemonldap-ng-store list
          sudo lemonldap-ng-store install \\
            &lt;plugin&gt; --activate</pre>
                </div>
                <div class="card">
                  <h3>3. Restart</h3>
                  <pre>sudo systemctl restart \\
            lemonldap-ng-fastcgi-server</pre>
                </div>
              </div>

              <div class="note">
                <strong>Tip:</strong> <code>--activate</code> automatically adds the plugin to
                <code>customPlugins</code> via <code>lemonldap-ng-cli</code>.
              </div>

              <h2>Other Commands</h2>
              <pre>lemonldap-ng-store info &lt;plugin-name&gt;       # Show plugin details
          lemonldap-ng-store installed                  # List installed plugins
          lemonldap-ng-store check                      # Check for updates
          sudo lemonldap-ng-store remove &lt;plugin-name&gt; # Remove a plugin</pre>

              <h2>GPG Verification</h2>
              <p>All archives are signed. The key is imported automatically on
              <code>add-store</code> (Trust On First Use). Set
              <code>gpgVerify = required</code> in <code>[store]</code> to enforce it.</p>
              <p>Public key: <a href="store-key.asc"><code>store-key.asc</code></a></p>

              <h2>Debian Repository</h2>
              <p>All plugins are also available as <a href="debian/">Debian packages</a>.</p>

              <h3>Setup</h3>
              <pre>curl -fsSL ${PAGES_URL}store-key.asc \\
            | sudo gpg --dearmor -o /usr/share/keyrings/linagora-llng-plugins.gpg

          echo "deb [signed-by=/usr/share/keyrings/linagora-llng-plugins.gpg] \\
            ${PAGES_URL}debian stable main" \\
            | sudo tee /etc/apt/sources.list.d/linagora-llng-plugins.list

          sudo apt update
          sudo apt install linagora-lemonldap-ng-plugin-&lt;name&gt;</pre>

              <div class="note">
                <strong>LLNG &lt; 2.23.0:</strong> the <code>linagora-lemonldap-ng-store</code>
                package in this repository provides <code>lemonldap-ng-store</code> for
                older versions. It is pulled automatically when needed.
              </div>

            </div>

            <div class="footer">
              <ul class="footer-links">
                <li><a href="index.json">Store index (JSON)</a></li>
                <li><a href="store-key.asc">GPG public key</a></li>
                <li><a href="debian/">Debian packages</a></li>
                <li><a href="https://github.com/linagora/lemonldap-ng-plugins">Source repository</a></li>
                <li><a href="https://lemonldap-ng.org">LemonLDAP::NG</a></li>
                <li><a href="https://linagora.com">Linagora</a></li>
              </ul>
              <p>Generated on $(date -u +%Y-%m-%d) from tag ${TAG}</p>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Build Debian packages
        run: |
          chmod +x debian/build-debs.sh
          TAG="${GITHUB_REF_NAME#v}"
          TAG="$TAG" debian/build-debs.sh _debs

      - name: Build APT repository
        run: |
          chmod +x debian/build-repo.sh
          GPG_PASSPHRASE="${{ secrets.GPG_PASSPHRASE }}" debian/build-repo.sh _debs _site/debian

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
